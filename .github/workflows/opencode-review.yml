name: AI Code Review
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - name: AI Code Review
        env:
          GH_TOKEN: ${{ secrets.BEEFORGE_REVIEW_PAT }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import subprocess
          import urllib.request
          import urllib.error
          import sys

          gh_token = os.environ.get("GH_TOKEN", "")
          api_key = os.environ.get("DEEPSEEK_API_KEY", "")

          # Read event payload
          with open(os.environ["GITHUB_EVENT_PATH"], "r") as f:
              event = json.load(f)

          pr = event.get("pull_request", {})
          repo = event.get("repository", {})
          repo_full = repo.get("full_name", "")
          pr_number = pr.get("number", "")
          pr_title = pr.get("title", "")
          pr_body = pr.get("body", "") or "(无描述)"
          pr_author = pr.get("user", {}).get("login", "")

          print(f"=== PR #{pr_number}: {pr_title} by {pr_author} ===", flush=True)

          def gh_api(endpoint, accept="application/vnd.github+json"):
              """Call GitHub API and return response text."""
              url = f"https://api.github.com/{endpoint}"
              req = urllib.request.Request(url)
              req.add_header("Authorization", f"Bearer {gh_token}")
              req.add_header("Accept", accept)
              req.add_header("User-Agent", "ai-code-review-bot")
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      return resp.read().decode("utf-8")
              except Exception as e:
                  print(f"GitHub API error for {endpoint}: {e}", flush=True)
                  return ""

          def gh_api_post(endpoint, body):
              """Call GitHub API POST and return response JSON."""
              url = f"https://api.github.com/{endpoint}"
              payload = json.dumps(body).encode("utf-8")
              req = urllib.request.Request(url, data=payload, method="POST")
              req.add_header("Authorization", f"Bearer {gh_token}")
              req.add_header("Accept", "application/vnd.github+json")
              req.add_header("Content-Type", "application/json")
              req.add_header("User-Agent", "ai-code-review-bot")
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      return json.loads(resp.read().decode("utf-8"))
              except Exception as e:
                  print(f"GitHub API POST error for {endpoint}: {e}", flush=True)
                  return {}

          # === Collect PR data via GitHub API ===
          print("Collecting changed files...", flush=True)
          files_resp = gh_api(f"repos/{repo_full}/pulls/{pr_number}/files")
          if files_resp:
              files_data = json.loads(files_resp)
              changed_files = "\n".join(
                  f"- {f['filename']} (+{f['additions']} -{f['deletions']})"
                  for f in files_data
              )
          else:
              changed_files = "(无法获取文件列表)"

          print("Collecting diff...", flush=True)
          detailed_diff = gh_api(
              f"repos/{repo_full}/pulls/{pr_number}",
              accept="application/vnd.github.v3.diff"
          )
          # Limit diff size to prevent token overflow
          if detailed_diff and len(detailed_diff) > 20000:
              detailed_diff = detailed_diff[:20000] + "\n... (diff 已截断，超过 20000 字符)"
          diff_lines = len(detailed_diff.splitlines()) if detailed_diff else 0
          print(f"Diff lines: {diff_lines}", flush=True)

          print("Collecting commits...", flush=True)
          commits_resp = gh_api(f"repos/{repo_full}/pulls/{pr_number}/commits")
          if commits_resp:
              commits_data = json.loads(commits_resp)
              commits = "\n".join(
                  f"- {c['commit']['message'].split(chr(10))[0]}"
                  for c in commits_data
              )
          else:
              commits = "(无法获取 commit 历史)"

          # === Safety check ===
          if not detailed_diff or diff_lines < 3:
              print("Diff is empty, skipping review...", flush=True)
              gh_api_post(f"repos/{repo_full}/issues/{pr_number}/comments", {
                  "body": "## 🤖 AI Code Review\n\n⚠️ 无法获取到代码变更内容（diff 为空），跳过此次 review。\n\n---\n*Powered by DeepSeek | Reviewed by beeforge-review-ai*"
              })
              sys.exit(0)

          # === Call DeepSeek API ===
          prompt = f"""你是一个资深的 code reviewer。请用中文对以下 Pull Request 进行全面的 code review。

          ## PR 信息
          - PR 标题: {pr_title}
          - PR 作者: {pr_author}
          - PR 描述: {pr_body}

          ## 变更文件
          {changed_files}

          ## 详细代码变更 (diff)
          ```
          {detailed_diff}
          ```

          ## Commit 历史
          {commits}

          请严格基于上面的 diff 内容进行 review，不要编造不存在的文件或代码。

          请从以下维度进行 review，并给出具体、可操作的反馈：

          1. **代码质量**：检查代码是否清晰、可维护，是否有明显的代码异味
          2. **潜在 Bug**：是否有逻辑错误、边界条件未处理、空指针等问题
          3. **安全漏洞**：是否有注入、XSS、敏感信息泄露等安全问题
          4. **性能问题**：是否有明显的性能瓶颈或不必要的资源消耗
          5. **最佳实践**：是否符合项目约定和行业最佳实践
          6. **Conventional Commits**：commit message 是否符合规范

          ## 输出格式要求

          请按以下格式输出：

          ### 📋 总体评价
          （一句话总结 PR 质量）

          ### ✅ 优点
          - （列出做得好的地方，必须基于实际 diff 中看到的内容）

          ### ⚠️ 需要改进
          （如果有，按严重程度排序。必须引用 diff 中的具体代码行）
          - **[文件名]** 描述问题和改进建议，引用具体代码片段

          ### 🔒 安全检查
          - （安全相关的发现，如无则写"未发现安全问题"）

          ### 📝 结论
          - **APPROVE** 或 **REQUEST_CHANGES**（给出明确结论）
          - （补充说明）

          重要提示：
          - 只关注 diff 中实际展示的代码，严禁编造不存在的文件、函数或代码行
          - 如果代码质量很好，大方地 approve
          - 如果有问题，必须引用 diff 中的具体代码片段
          """

          payload = json.dumps({
              "model": "deepseek-chat",
              "messages": [
                  {"role": "system", "content": "你是一个严格但公正的 code reviewer，专注于代码质量和安全性。请直接输出 review 结果，不要有多余的寒暄。只 review diff 中实际展示的代码，不要编造任何不存在的内容。"},
                  {"role": "user", "content": prompt}
              ],
              "temperature": 0.3,
              "max_tokens": 4096
          }).encode("utf-8")

          print("Calling DeepSeek API...", flush=True)
          review_body = ""
          try:
              req = urllib.request.Request(
                  "https://api.deepseek.com/chat/completions",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {api_key}",
                      "Content-Type": "application/json"
                  }
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  result = json.loads(resp.read().decode("utf-8"))
                  if "choices" in result and len(result["choices"]) > 0:
                      review_body = result["choices"][0]["message"]["content"]
                  elif "error" in result:
                      review_body = f"API Error: {result['error']}"
                  else:
                      review_body = "No review content received from API"
          except Exception as e:
              review_body = f"Failed to call DeepSeek API: {e}"

          print(f"Review result length: {len(review_body)} chars", flush=True)

          # === Handle errors ===
          if not review_body or "API Error" in review_body or "Failed to call" in review_body:
              print("Review failed, posting error comment...", flush=True)
              gh_api_post(f"repos/{repo_full}/issues/{pr_number}/comments", {
                  "body": f"## 🤖 AI Code Review\n\n❌ Review 过程中出错：\n\n```\n{review_body}\n```\n\n---\n*Powered by DeepSeek | Reviewed by beeforge-review-ai*"
              })
              sys.exit(1)

          # === Post review comment ===
          print("Posting review comment...", flush=True)
          comment_body = f"## 🤖 AI Code Review\n\n{review_body}\n\n---\n*Powered by DeepSeek | Reviewed by beeforge-review-ai*"
          gh_api_post(f"repos/{repo_full}/issues/{pr_number}/comments", {"body": comment_body})

          # === Submit review (APPROVE or REQUEST_CHANGES) ===
          if "REQUEST_CHANGES" in review_body or "request changes" in review_body:
              print("Submitting REQUEST_CHANGES review...", flush=True)
              gh_api_post(f"repos/{repo_full}/pulls/{pr_number}/reviews", {
                  "event": "REQUEST_CHANGES",
                  "body": "🤖 AI Code Review: 建议修改后再合并。详见上方评论。"
              })
          else:
              print("Submitting APPROVE review...", flush=True)
              gh_api_post(f"repos/{repo_full}/pulls/{pr_number}/reviews", {
                  "event": "APPROVE",
                  "body": "🤖 AI Code Review: 代码质量通过审查。详见上方评论。"
              })

          print("=== Review completed ===", flush=True)
          PYEOF
