name: AI Code Review
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: AI Code Review
        env:
          GH_TOKEN: ${{ secrets.BEEFORGE_REVIEW_PAT }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "=== Collecting PR diff ==="
          # Get diff between base and head
          DIFF=$(git diff "${BASE_SHA}...${HEAD_SHA}" --stat 2>/dev/null || git diff "${BASE_SHA}" "${HEAD_SHA}" --stat 2>/dev/null || echo "Unable to get diff")
          echo "Diff stat:"
          echo "${DIFF}"

          # Get changed files
          CHANGED_FILES=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" 2>/dev/null || echo "")
          echo "Changed files: ${CHANGED_FILES}"

          # Get detailed diff (limited to prevent token overflow)
          DETAILED_DIFF=$(git diff "${BASE_SHA}" "${HEAD_SHA}" 2>/dev/null | head -3000 || echo "")

          echo "=== Collecting commit messages ==="
          COMMITS=$(git log --oneline "${BASE_SHA}...${HEAD_SHA}" 2>/dev/null || git log --oneline -10 2>/dev/null || echo "")
          echo "Commits: ${COMMITS}"

          echo "=== Calling DeepSeek API for code review ==="
          REVIEW_PROMPT=$(cat <<'PROMPT_EOF'
          你是一个资深的 code reviewer。请用中文对以下 Pull Request 进行全面的 code review。

          ## PR 信息
          - PR 标题: ${PR_TITLE}
          - PR 作者: ${PR_AUTHOR}
          - PR 描述: ${PR_BODY}

          ## 变更文件
          ${CHANGED_FILES}

          ## Diff 统计
          ${DIFF}

          ## 详细代码变更
          ${DETAILED_DIFF}

          ## Commit 历史
          ${COMMITS}

          请从以下维度进行 review，并给出具体、可操作的反馈：

          1. **代码质量**：检查代码是否清晰、可维护，是否有明显的代码异味
          2. **潜在 Bug**：是否有逻辑错误、边界条件未处理、空指针等问题
          3. **安全漏洞**：是否有注入、XSS、敏感信息泄露等安全问题
          4. **性能问题**：是否有明显的性能瓶颈或不必要的资源消耗
          5. **最佳实践**：是否符合项目约定和行业最佳实践
          6. **Conventional Commits**：commit message 是否符合规范

          ## 输出格式要求

          请按以下格式输出：

          ### 📋 总体评价
          （一句话总结 PR 质量）

          ### ✅ 优点
          - （列出做得好的地方）

          ### ⚠️ 需要改进
          （如果有，按严重程度排序）
          - **[文件名:行号]** 描述问题和改进建议

          ### 🔒 安全检查
          - （安全相关的发现，如无则写"未发现安全问题"）

          ### 📝 结论
          - **APPROVE** 或 **REQUEST_CHANGES**（给出明确结论）
          - （补充说明）

          注意：
          - 只关注代码本身的质量，不要评价 PR 的必要性
          - 如果代码质量很好，大方地 approve
          - 如果有问题，给出具体的代码修改建议
          PROMPT_EOF
          )

          # Escape special characters for JSON
          ESCAPED_PROMPT=$(printf '%s' "${REVIEW_PROMPT}" | python3 -c "
          import sys, json
          content = sys.stdin.read()
          print(json.dumps(content))
          ")

          # Call DeepSeek API
          echo "Sending review request to DeepSeek..."
          RESPONSE=$(curl -s --max-time 120 https://api.deepseek.com/chat/completions \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"deepseek-chat\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"你是一个严格但公正的 code reviewer，专注于代码质量和安全性。请直接输出 review 结果，不要有多余的寒暄。\"},
                {\"role\": \"user\", \"content\": ${ESCAPED_PROMPT}}
              ],
              \"temperature\": 0.3,
              \"max_tokens\": 4096
            }")

          # Extract review content from response
          REVIEW_BODY=$(echo "${RESPONSE}" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              if 'choices' in data and len(data['choices']) > 0:
                  print(data['choices'][0]['message']['content'])
              elif 'error' in data:
                  print(f'API Error: {data[\"error\"]}')
              else:
                  print('No review content received from API')
          except Exception as e:
              print(f'Failed to parse API response: {e}')
          ")

          echo "=== Review Result ==="
          echo "${REVIEW_BODY}"

          echo "=== Posting review comment ==="
          # Post as PR comment
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --method POST \
            --field body="## 🤖 AI Code Review

          ${REVIEW_BODY}

          ---
          *Powered by DeepSeek | Reviewed by beeforge-review-ai*"

          # Determine conclusion and submit review
          if echo "${REVIEW_BODY}" | grep -qi "REQUEST_CHANGES\|request changes"; then
            echo "Submitting REQUEST_CHANGES review..."
            gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              --method POST \
              --field event="REQUEST_CHANGES" \
              --field body="🤖 AI Code Review: 建议修改后再合并。详见上方评论。" || true
          else
            echo "Submitting APPROVE review..."
            gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              --method POST \
              --field event="APPROVE" \
              --field body="🤖 AI Code Review: 代码质量通过审查。详见上方评论。" || true
          fi

          echo "=== Review completed ==="
