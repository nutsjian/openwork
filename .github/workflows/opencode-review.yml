name: AI Code Review
on:
  workflow_run:
    workflows: ["PR Signal"]
    types: [completed]

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Get PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.BEEFORGE_REVIEW_PAT }}
        run: |
          PR_NUMBER=$(gh pr list --repo ${{ github.repository }} --state open --json number,headRefName --jq ".[] | select(.headRefName == \"${{ github.event.workflow_run.head_branch }}\") | .number" || true)
          if [ -z "$PR_NUMBER" ]; then
            # Fallback: search by SHA
            PR_NUMBER=$(gh pr list --repo ${{ github.repository }} --state open --json number,headSha --jq ".[] | select(.headSha == \"${{ github.event.workflow_run.head_sha }}\") | .number" || true)
          fi
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - uses: anomalyco/opencode/github@latest
        if: steps.pr.outputs.number != ''
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.BEEFORGE_REVIEW_PAT }}
        with:
          model: deepseek/deepseek-chat
          use_github_token: true
          prompt: |
            你是项目的 code reviewer，请用中文 review 这个 PR：
            - 检查代码质量和潜在 bug
            - 检查是否符合 Conventional Commits 规范
            - 检查是否有安全问题
            - 给出具体的改进建议
            - 最终给出 approve 或 request changes 的结论
