name: AI Code Review
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - name: AI Code Review
        env:
          GH_TOKEN: ${{ secrets.BEEFORGE_REVIEW_PAT }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          echo "=== Collecting PR info via GitHub API ==="

          # Get changed files list
          CHANGED_FILES=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | "\(.filename) (+\(.additions) -\(.deletions))"' 2>/dev/null || echo "")
          echo "Changed files:"
          echo "${CHANGED_FILES}"

          # Get diff via GitHub API (accept header for raw diff format)
          DETAILED_DIFF=$(gh api \
            -H "Accept: application/vnd.github.v3.diff" \
            "repos/${REPO}/pulls/${PR_NUMBER}" 2>/dev/null | head -5000 || echo "")
          DIFF_LINES=$(echo "${DETAILED_DIFF}" | wc -l | tr -d ' ')
          echo "Diff lines: ${DIFF_LINES}"

          # Get commit messages via GitHub API
          COMMITS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/commits" \
            --jq '.[] | "- \(.commit.message | split("\n")[0])"' 2>/dev/null || echo "")
          echo "Commits:"
          echo "${COMMITS}"

          # Safety check: if diff is empty, skip review
          if [ -z "${DETAILED_DIFF}" ] || [ "${DIFF_LINES}" -lt 3 ]; then
            echo "No diff content found, posting skip comment..."
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --method POST \
              --field body="## 🤖 AI Code Review

          ⚠️ 无法获取到代码变更内容（diff 为空），跳过此次 review。

          这通常发生在 PR 没有实际代码变更的情况下。

          ---
          *Powered by DeepSeek | Reviewed by beeforge-review-ai*"
            exit 0
          fi

          echo "=== Calling DeepSeek API for code review ==="
          # Build prompt using Python for reliable variable interpolation and JSON escaping
          REVIEW_BODY=$(python3 << 'PYEOF'
          import json
          import os
          import urllib.request
          import urllib.error

          pr_title = os.environ.get("PR_TITLE", "")
          pr_body = os.environ.get("PR_BODY", "") or "(无描述)"
          pr_author = os.environ.get("PR_AUTHOR", "")
          changed_files = os.environ.get("CHANGED_FILES", "")
          detailed_diff = os.environ.get("DETAILED_DIFF", "")
          commits = os.environ.get("COMMITS", "")
          api_key = os.environ.get("DEEPSEEK_API_KEY", "")

          prompt = f"""你是一个资深的 code reviewer。请用中文对以下 Pull Request 进行全面的 code review。

          ## PR 信息
          - PR 标题: {pr_title}
          - PR 作者: {pr_author}
          - PR 描述: {pr_body}

          ## 变更文件
          {changed_files}

          ## 详细代码变更 (diff)
          ```
          {detailed_diff}
          ```

          ## Commit 历史
          {commits}

          请严格基于上面的 diff 内容进行 review，不要编造不存在的文件或代码。

          请从以下维度进行 review，并给出具体、可操作的反馈：

          1. **代码质量**：检查代码是否清晰、可维护，是否有明显的代码异味
          2. **潜在 Bug**：是否有逻辑错误、边界条件未处理、空指针等问题
          3. **安全漏洞**：是否有注入、XSS、敏感信息泄露等安全问题
          4. **性能问题**：是否有明显的性能瓶颈或不必要的资源消耗
          5. **最佳实践**：是否符合项目约定和行业最佳实践
          6. **Conventional Commits**：commit message 是否符合规范

          ## 输出格式要求

          请按以下格式输出：

          ### 📋 总体评价
          （一句话总结 PR 质量）

          ### ✅ 优点
          - （列出做得好的地方，必须基于实际 diff 中看到的内容）

          ### ⚠️ 需要改进
          （如果有，按严重程度排序。必须引用 diff 中的具体代码行）
          - **[文件名]** 描述问题和改进建议，引用具体代码片段

          ### 🔒 安全检查
          - （安全相关的发现，如无则写"未发现安全问题"）

          ### 📝 结论
          - **APPROVE** 或 **REQUEST_CHANGES**（给出明确结论）
          - （补充说明）

          重要提示：
          - 只关注 diff 中实际展示的代码，严禁编造不存在的文件、函数或代码行
          - 如果代码质量很好，大方地 approve
          - 如果有问题，必须引用 diff 中的具体代码片段
          """

          payload = json.dumps({
              "model": "deepseek-chat",
              "messages": [
                  {"role": "system", "content": "你是一个严格但公正的 code reviewer，专注于代码质量和安全性。请直接输出 review 结果，不要有多余的寒暄。只 review diff 中实际展示的代码，不要编造任何不存在的内容。"},
                  {"role": "user", "content": prompt}
              ],
              "temperature": 0.3,
              "max_tokens": 4096
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://api.deepseek.com/chat/completions",
              data=payload,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              }
          )

          print("Sending review request to DeepSeek...", flush=True)
          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  result = json.loads(resp.read().decode("utf-8"))
                  if "choices" in result and len(result["choices"]) > 0:
                      print(result["choices"][0]["message"]["content"])
                  elif "error" in result:
                      print(f"API Error: {result['error']}")
                  else:
                      print("No review content received from API")
          except Exception as e:
              print(f"Failed to call DeepSeek API: {e}")
          PYEOF
          )

          echo "=== Review Result ==="
          echo "${REVIEW_BODY}"

          # Check if review body is empty or error
          if [ -z "${REVIEW_BODY}" ] || echo "${REVIEW_BODY}" | grep -qi "API Error\|Failed to call"; then
            echo "Review failed, posting error comment..."
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --method POST \
              --field body="## 🤖 AI Code Review

          ❌ Review 过程中出错：

          \`\`\`
          ${REVIEW_BODY}
          \`\`\`

          ---
          *Powered by DeepSeek | Reviewed by beeforge-review-ai*"
            exit 1
          fi

          echo "=== Posting review comment ==="
          # Post as PR comment
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --method POST \
            --field body="## 🤖 AI Code Review

          ${REVIEW_BODY}

          ---
          *Powered by DeepSeek | Reviewed by beeforge-review-ai*"

          # Determine conclusion and submit review
          if echo "${REVIEW_BODY}" | grep -qi "REQUEST_CHANGES\|request changes"; then
            echo "Submitting REQUEST_CHANGES review..."
            gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              --method POST \
              --field event="REQUEST_CHANGES" \
              --field body="🤖 AI Code Review: 建议修改后再合并。详见上方评论。" || true
          else
            echo "Submitting APPROVE review..."
            gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
              --method POST \
              --field event="APPROVE" \
              --field body="🤖 AI Code Review: 代码质量通过审查。详见上方评论。" || true
          fi

          echo "=== Review completed ==="
